appId: T.Work.InvestigatingAxolotls
productName: InvestigatingAxolotls
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!resources/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  # Embedded Python runtime (created by setup-python-runtime.ps1)
  - from: resources/python-runtime
    to: resources/python-runtime
  # Backend scripts + models
  - from: resources/python-backend
    to: resources/python-backend
  # Copy main.py and kp_est_01_results.py from their source location
  - from: src/backend/main.py
    to: resources/python-backend/main.py
  - from: src/backend/kp_est_01_results.py
    to: resources/python-backend/kp_est_01_results.py
win:
  executableName: InvestigatingAxolotls
  target:
    - nsis
    - zip
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
